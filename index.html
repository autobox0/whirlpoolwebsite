<!DOCTYPE html>
<html lang="en">
<head>
<title>Whirlpool Galaxy</title>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background-color: #0f0f0f;
  color: #e0e0e0;
  line-height: 1.6;
}

header {
  background-color: #1a1a1a;
  border-bottom: 1px solid #333;
  position: sticky;
  top: 0;
  z-index: 100;
}

nav {
  max-width: 1200px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  padding: 0 20px;
  height: 70px;
}

.logo {
  font-size: 24px;
  font-weight: 700;
  margin-right: auto;
  color: #ffffff;
  letter-spacing: -0.5px;
}

.nav-links {
  display: flex;
  gap: 30px;
  list-style: none;
}

.nav-links a {
  text-decoration: none;
  color: #b0b0b0;
  font-weight: 500;
  font-size: 14px;
  transition: color 0.3s ease;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.nav-links a:hover {
  color: #ffffff;
}

.nav-links a.active {
  color: #ffffff;
  border-bottom: 2px solid #ffffff;
  padding-bottom: 5px;
}

main {
  max-width: 1200px;
  margin: 0 auto;
  padding: 60px 20px;
}

h1 {
  font-size: 48px;
  font-weight: 700;
  margin-bottom: 20px;
  color: #ffffff;
  letter-spacing: -1px;
}

p {
  font-size: 16px;
  color: #a0a0a0;
  margin-bottom: 30px;
}

.hero {
  min-height: 400px;
  display: flex;
  flex-direction: column;
  justify-content: center;
}
</style>
</head>
<body>

<header>
  <nav>
    <div class="logo">Whirlpool</div>
    <ul class="nav-links">
      <li><a href="#a" class="active">A</a></li>
      <li><a href="#b">B</a></li>
      <li><a href="#c">C</a></li>
      <li><a href="#d">D</a></li>
    </ul>
  </nav>
</header>

<main>
  <section class="hero">
    <h1>Whirlpool Galaxy</h1>
    <p>Test123</p>
  </section>
</main>

</body>
</html>
